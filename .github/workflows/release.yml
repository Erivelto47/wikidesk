# Gera os instaladores nativos (macOS, Windows e Linux) e publica na Release.
#
# Como usar: crie e envie uma tag de versão —
#   git tag v1.0.0
#   git push origin v1.0.0
# Cada job builda no seu próprio SO (instaladores nativos não podem ser
# gerados em cross-compile) e anexa o artefato na Release da tag.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            artifact: build/compose/binaries/main/dmg/*.dmg
          - os: windows-latest
            task: packageMsi
            artifact: build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            task: packageDeb
            artifact: build/compose/binaries/main/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Qualquer JDK 17+ serve para o launcher do Gradle; o toolchain 25
      # exigido pelo build é baixado automaticamente (foojay resolver).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Testes
        run: ./gradlew build --console=plain
        shell: bash

      - name: Empacotar instalador
        run: ./gradlew ${{ matrix.task }} --console=plain
        shell: bash

      - name: Publicar na Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
